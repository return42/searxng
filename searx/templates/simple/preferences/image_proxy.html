<fieldset>
  {% set comp = preferences.components["image_proxy"] %}
  <legend id="pref_{{comp.form_id}}">{{ _("Image proxy") }}</legend>
  <p class="value">
    <input type="checkbox" name="{{comp.form_id}}" aria-labelledby="pref_{{comp.form_id}}" class="checkbox-onoff" {%- if comp.value -%} checked {%- endif -%}>
  </p>
  <div class="description">
    {{ _("Proxying image results through SearXNG") }}
  </div>
</fieldset>
