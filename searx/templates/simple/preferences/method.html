<fieldset>
  {%- set comp = preferences.components["method"] -%}
  <legend id="pref_{{comp.form_id}}">{{- _('HTTP Method') -}}</legend>
  <div class="value">
    <select name="{{comp.form_id}}" aria-labelledby="pref_{{comp.form_id}}">
      {%- for name, selected in comp.menu_options() -%}
        <option value="{{name}}" {%- if selected %} selected="selected" {%- endif -%}>{{name}}</option>
      {%- endfor -%}
    </select>
  </div>
  <div class="description">
    {{- _('Change how forms are submitted') }}
    <a href="https://en.wikipedia.org/wiki/Hypertext_Transfer_Protocol#Request_methods" rel="external">🔗</a>
  </div>
</fieldset>
