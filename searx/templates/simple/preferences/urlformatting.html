<fieldset>
  {%- set comp = preferences.components["url_formatting"] %}
  <legend id="pref_{{comp.form_id}}">{{- _('URL formatting') -}}</legend>
  <div class="value">
      <select name="{{comp.form_id}}" aria-labelledby="pref_{{comp.form_id}}">
        <option value="pretty" {% if comp.value == "pretty" %} selected="selected" {% endif %}>{{_("Pretty")}}</option>
        <option value="full" {% if comp.value == "full" %} selected="selected" {% endif %}>{{_("Full"))}}</option>
        <option value="host" {% if comp.value == "host" %} selected="selected" {% endif %}>{{_('Host')}}</option>
      </select>
  </div>
  <div class="description">{{ _("Change result URL formatting") }}</div>
</fieldset>
