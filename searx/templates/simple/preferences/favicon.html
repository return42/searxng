<fieldset>
  {% set comp = preferences.components["favicon_resolver"] %}
  <legend id="pref_{{comp.form_id}}">{{_('Favicon Resolver')}}</legend>
  <div class="value">
    <select name="{{comp.form_id}}" aria-labelledby="pref_{{comp.form_id}}">
      {% for name, selected in comp.menu_options() %}
        <option value="{{name}}" {% if selected %} selected="selected" {% endif %}>{{name}}</option>
      {% endfor %}
    </select>
  </div>
  <div class="description">{{_("Display favicons near search results")}}</div>
</fieldset>
