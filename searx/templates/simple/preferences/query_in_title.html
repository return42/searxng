<fieldset>
  {% set comp = preferences.components["query_in_title"] -%}
  <legend id="pref_{{comp.form_id}}">{{ _("Query in the page's title") }}</legend>
  <p class="value">
    <input type="checkbox" name="{{comp.form_id}}" aria-labelledby="pref_{{comp.form_id}}" class="checkbox-onoff" {%- if comp.value -%} checked {%- endif -%}>
  </p>
  <div class="description">
    {{ _("When enabled, the result page's title contains your query. Your browser can record this title") -}}
  </div>
</fieldset>
